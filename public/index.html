<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
        content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no" />
  <title>OmniHub</title>
  <!-- Telegram WebApp SDK — must load FIRST -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<div id="app">

  <!-- ── DASHBOARD VIEW ── -->
  <section id="view-dashboard" class="view active">
    <header class="topbar">
      <div class="brand">OmniHub</div>
      <div class="balance-pill">
        <span class="coin-icon">&#127922;</span>
        <span id="balance-amount">--</span>
      </div>
    </header>

    <div class="hero-card">
      <div class="hero-title">Welcome<span id="user-name"></span></div>
      <div class="hero-sub">Choose a game and start winning</div>
    </div>

<div class="game-grid">
      <button id="open-bingo" class="game-tile">
        <div class="tile-icon">&#127919;</div>
        <div class="tile-name">5&#215;5 Bingo</div>
        <div class="tile-tag">Provably Fair</div>
      </button>
      <div class="game-tile disabled">
        <div class="tile-icon">&#127920;</div>
        <div class="tile-name">More Games</div>
        <div class="tile-tag">Coming Soon</div>
      </div>
    </div>
  </section>

  <!-- ── BINGO VIEW ── -->
  <section id="view-bingo" class="view">
    <header class="topbar">
      <button id="back-to-dashboard" class="back-btn">&#8592;</button>
      <div class="brand">5&#215;5 Bingo</div>
      <div class="balance-pill">
        <span class="coin-icon">&#127922;</span>
        <span id="balance-amount-game">--</span>
      </div>
    </header>

    <div id="status-banner" class="status-banner">
      Tap Join to enter the next round
    </div>

<div id="called-strip" class="called-strip"></div>

    <div class="bingo-card">
      <div class="bingo-headers">
        <div class="bingo-header">B</div>
        <div class="bingo-header">I</div>
        <div class="bingo-header">N</div>
        <div class="bingo-header">G</div>
        <div class="bingo-header">O</div>
      </div>
      <div id="bingo-grid" class="bingo-grid"></div>
    </div>
<script src="/socket.io/socket.io.js"></script>
    <div class="action-row">
      <button id="join-btn"   class="primary-btn">Join Round — 50 coins</button>
      <button id="bingo-btn"  class="primary-btn success hidden">&#127881; BINGO!</button>
    </div>
  </section>

</div>

<!-- Socket.IO client — must match server package version 4.7.5 -->

<script src="app.js"></script>
</body>
</html>`;
